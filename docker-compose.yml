services:
  ksc:
    build: .
    container_name: ksc-auto-catch
    restart: unless-stopped
    volumes:
      # Mount session.json exported from your local machine (read-only)
      - ./session.json:/app/session.json:ro
      # Persist logs to host for inspection
      - ./cloud_sniper.log:/app/cloud_sniper.log

    # --- Edit these arguments for your target course(s) ---
    command:
      - "--sections"
      - "12345,67890"               # TODO: replace with your target section IDs
      - "--interval"
      - "15"
      - "--load-session"
      - "session.json"
      # Optional features — uncomment as needed:
      # - "--waitlist"
      # - "--drop-section"
      # - "26667"                     # old course to drop synchronously
      # - "--webhook"
      # - "https://discord.com/api/webhooks/xxx/yyy"
